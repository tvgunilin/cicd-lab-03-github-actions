# yamllint configuration for the lab.
# Built up during Block A — we disable line-length because Compose files
# often have legitimately long environment lines that don't benefit from wrapping.

extends: default

rules:
  line-length: disable
  # Compose files use the shorthand "key: value" style; document-start is noise here.
  document-start: disable
  # Allow trailing newlines (some editors strip them; this is a lab, not a kernel).
  empty-lines:
    max-end: 1
  # GitHub Actions workflows use `on:` as a key; without this, yamllint flags every workflow
  # because `on` is a YAML truthy value. This is a well-known annoyance.
  truthy:
    check-keys: false
