name: Self-hosted demo

# A throwaway job for the Part 3 self-hosted-runner stretch. It does NOT run on
# GitHub-hosted infra: `runs-on` matches the labels of the ephemeral Docker runner
# you register locally (see docs/self-hosted-runners.md), so it only executes once
# your runner is up and listening. Trigger it by hand:
#
#   gh workflow run self-hosted-demo.yml
#
# Manual-only — no push/PR trigger — so it never blocks a merge and never runs
# until you deliberately dispatch it.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hello-from-my-machine:
    # These labels must match the runner's LABELS env var exactly, or the job
    # sits queued forever waiting for a runner that never claims it.
    runs-on: [self-hosted, local-lab03]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Prove where this ran
        run: |
          echo "Running on host: $(hostname)"
          echo "As user:         $(whoami)"
          echo "Runner name:     ${RUNNER_NAME:-<unset>}"

      - name: The bring-your-own-tools lesson
        # ubuntu-latest ships shellcheck; your bare runner does not. Expect this
        # to fail unless you installed shellcheck on the runner host — that gap
        # IS the lesson, not a bug.
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck present — your runner has it on PATH."
            shellcheck scripts/*.sh
          else
            echo "shellcheck NOT found on this runner."
            echo "GitHub-hosted has it preinstalled; a bare self-hosted runner does not."
            echo "Install it on the host, or add an install step — 'works on ubuntu-latest' is an assumption."
          fi
