name: CI

# Runs on every PR into main, and on direct pushes to main as a backstop.
# Path filters keep the workflow off README-only changes.
on:
  pull_request:
    paths:
      - "sample-app/**"
      - "scripts/**"
      - "docker-compose.yml"
      - ".github/workflows/**"
      - ".yamllint.yml"
  push:
    branches: [main]

# Least-privilege default. Individual jobs that need more should override.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (yaml, docker, shell, python, actions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tools
        run: pip install ruff==0.6.9 yamllint==1.35.1

      - name: yamllint
        run: yamllint -c .yamllint.yml .

      - name: ruff
        run: ruff check .

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: sample-app/Dockerfile

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck scripts/*.sh

      - name: docker compose config
        run: docker compose config -q

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: sample-app/requirements.txt

      - name: Install deps
        run: pip install -r sample-app/requirements.txt

      - name: Run tests
        working-directory: sample-app
        run: pytest tests -q
