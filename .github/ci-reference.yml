name: CI

# Runs on every PR into main, and on direct pushes to main as a backstop.
# Path filters keep the workflow off docs-only changes.
on:
  pull_request:
    paths:
      - "projects/**"
      - "scripts/**"
      - "docker-compose.yml"
      - ".github/workflows/**"
      - ".yamllint.yml"
      - "rule_config.json"
  push:
    branches: [main]

# Least-privilege default. Individual jobs that need more should override.
permissions:
  contents: read

jobs:
  # Job ids double as the status-check names branch protection matches on.
  # Keep them stable — renaming `lint`/`validate` (or overriding them with a
  # `name:`) silently orphans the required checks configured on main.
  lint:
    runs-on: ubuntu-latest
    # A hung job otherwise runs (and bills) for up to 6 hours. This job installs
    # tools (apt + pip + a Docker-based action), so give it more headroom than
    # validate — a required check that flakes on a slow mirror blocks everyone.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tools
        run: pip install yamllint==1.35.1 ign-lint==0.6.1

      - name: yamllint
        run: yamllint -c .yamllint.yml .

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck scripts/*.sh

      - name: ignition-lint (Perspective views)
        run: ign-lint --config rule_config.json --files "projects/**/view.json"

      - name: docker compose config
        run: docker compose config -q

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate project files
        # Gateway-free green/red signal: every project *.json is valid JSON and
        # every code.py parses as Python 3. The same check you run locally.
        run: scripts/validate.sh
