# Mustry Academy — Lab 03
# A single Ignition 8.3 gateway, used as the subject of the GitHub Actions exercises.
#
# Same gateway you finished lab-02 with — this lab does not change the project,
# it builds CI *around* it. Two things to understand about how it's wired:
#   - The gateway's own config + runtime state live in a NAMED VOLUME
#     (ignition-data) that it generates itself on first boot. It never lands in
#     the repo, so you never see or touch gateway config here (that's Lab 04).
#   - The only thing bind-mounted from the repo is ./projects, so the project
#     files you (and CI) validate are the project files the gateway runs.
#
# Run it:
#   cp .env.example .env
#   ops/setup.sh              # or:  docker compose up -d
# Then:
#   open http://localhost:8088   (log in with the .env credentials)

services:
  ignition:
    image: inductiveautomation/ignition:8.3.6
    container_name: lab03-ignition
    # root avoids host/container uid mismatches on the bind-mounted ./projects.
    user: root
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      # Gateway-owned config + runtime state: self-generated, never in the repo.
      - ignition-data:/usr/local/bin/ignition/data
      # The one thing you edit: project files, straight from the repo.
      - ./projects:/usr/local/bin/ignition/data/projects
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      IGNITION_EDITION: standard
      GATEWAY_ADMIN_USERNAME: "${GATEWAY_ADMIN_USERNAME:-admin}"
      GATEWAY_ADMIN_PASSWORD: "${GATEWAY_ADMIN_PASSWORD:-password}"
      TZ: "Europe/Brussels"
    command: >
      -n lab03
      -m 1024
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/StatusPing"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

volumes:
  ignition-data:
